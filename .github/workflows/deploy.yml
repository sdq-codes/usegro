name: Deploy to ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - base
          - crm

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: 979848238027
  ECS_CLUSTER: usegro-production-cluster
  PROJECT: usegro

jobs:
  deploy-base:
    name: Deploy base
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'base' || inputs.service == '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/base/Dockerfile
          push: true
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/base:production
          cache-from: type=gha,scope=base
          cache-to: type=gha,scope=base,mode=max

      - name: Force ECS redeploy (base)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service usegro-production-base \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

      - name: Wait for base to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services usegro-production-base

  deploy-crm:
    name: Deploy crm
    runs-on: ubuntu-latest
    if: ${{ inputs.service == 'crm' || inputs.service == '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push crm image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/crm/Dockerfile.prod
          push: true
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT }}/crm:production
          cache-from: type=gha,scope=crm
          cache-to: type=gha,scope=crm,mode=max

      - name: Force ECS redeploy (crm)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service usegro-production-crm \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

      - name: Wait for crm to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services usegro-production-crm
