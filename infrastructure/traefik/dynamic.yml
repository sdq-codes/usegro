http:
  middlewares:
    cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "Origin"
          - "Content-Type"
          - "Accept"
          - "Authorization"
          - "X-CRM-ID"
        accessControlExposeHeaders:
          - "Authorization"
          - "X-Request-Id"
          - "X-CRM-ID"
        accessControlAllowOriginList:
          - "http://localhost"
          - "http://localhost:3000"
        accessControlAllowCredentials: true
        accessControlMaxAge: 100
        addVaryHeader: true
